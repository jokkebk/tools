<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZIP Image Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #181a1f;
      --panel-strong: #20232a;
      --text: #f0f1f3;
      --muted: #a5adba;
      --border: rgba(255, 255, 255, 0.16);
      --border-soft: rgba(255, 255, 255, 0.10);
      --accent: #63d2c6;
      --danger: #ff8f8f;
      --gap: 12px;
      --tile-min: 180px;
      --radius: 8px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    body.viewer-open {
      overflow: hidden;
    }

    button,
    select {
      font: inherit;
    }

    .hidden {
      display: none !important;
    }

    .bar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(24, 26, 31, 0.94);
      border-bottom: 1px solid var(--border-soft);
      backdrop-filter: blur(6px);
      user-select: none;
    }

    .bar-left,
    .bar-right,
    .archive-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .bar-left {
      flex: 1;
    }

    .title {
      flex: 0 0 auto;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status {
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar button,
    .drop-actions button,
    .bar select {
      min-height: 34px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }

    .bar button,
    .drop-actions button {
      padding: 7px 10px;
      cursor: pointer;
    }

    .bar button:hover,
    .drop-actions button:hover,
    .bar select:hover {
      border-color: var(--border);
      background: rgba(255, 255, 255, 0.10);
    }

    .bar button:active,
    .drop-actions button:active {
      transform: translateY(1px);
    }

    .bar button:disabled,
    .bar select:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .bar button:focus-visible,
    .drop-actions button:focus-visible,
    .bar select:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .archive-select {
      width: min(34vw, 360px);
      padding: 6px 28px 6px 10px;
      color: var(--text);
    }

    .icon-button {
      width: 36px;
      padding: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--tile-min), 1fr));
      gap: var(--gap);
      align-items: start;
      padding: 12px;
    }

    .tile {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      padding: 0;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      background: var(--panel);
      color: inherit;
      content-visibility: auto;
      contain-intrinsic-size: 230px 230px;
      cursor: pointer;
      text-align: left;
    }

    .tile:hover {
      border-color: var(--border);
    }

    .tile:active {
      transform: translateY(1px);
    }

    .tile:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .thumb {
      position: relative;
      width: 100%;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      background: #0f1116;
    }

    .thumb img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      -webkit-user-drag: none;
    }

    .thumb.skeleton::before {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          100deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.08) 45%,
          rgba(255, 255, 255, 0) 80%
        );
      content: "";
      transform: translateX(-65%);
      animation: shimmer 1.2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-65%); }
      100% { transform: translateX(65%); }
    }

    .label {
      overflow: hidden;
      padding: 8px 10px 10px;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tile.broken .thumb {
      background: #2c1d20;
    }

    .tile.broken .label {
      color: var(--danger);
    }

    #drop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0) 45%),
        var(--bg);
      text-align: center;
    }

    #drop.loading {
      cursor: progress;
    }

    .drop-inner {
      width: min(680px, 100%);
      padding: 34px 24px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: rgba(24, 26, 31, 0.86);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.42);
    }

    .drop-title {
      margin-bottom: 8px;
      font-size: 28px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .drop-sub {
      margin-bottom: 16px;
      color: var(--muted);
      line-height: 1.45;
    }

    .drop-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .drop-status {
      min-height: 1.3em;
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .drop-foot {
      margin-top: 16px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 12px;
      line-height: 1.5;
    }

    body.drag-over #drop.hidden {
      display: flex !important;
      background: rgba(16, 17, 20, 0.92);
    }

    body.drag-over .drop-title::after {
      color: rgba(255, 255, 255, 0.62);
      content: " (drop to load)";
      font-size: 0.55em;
      font-weight: 650;
    }

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      background: #000;
      user-select: none;
    }

    .viewer-scroll {
      flex: 1;
      width: 100%;
      height: 100%;
    }

    .viewer-scroll.fit {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: zoom-in;
    }

    .viewer-scroll.fit img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .viewer-scroll.one {
      overflow: auto;
      padding: 24px;
      cursor: grab;
    }

    .viewer-scroll.one.locked {
      cursor: grabbing;
    }

    .viewer-scroll.one img {
      display: block;
      width: auto;
      height: auto;
      max-width: none;
      max-height: none;
    }

    .hud {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.78), rgba(0, 0, 0, 0));
      font-size: 12px;
      pointer-events: none;
    }

    .viewer-info {
      overflow: hidden;
      max-width: 72vw;
      color: rgba(255, 255, 255, 0.92);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-hints {
      color: rgba(255, 255, 255, 0.70);
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      .bar {
        flex-wrap: wrap;
      }

      .bar-left,
      .bar-right {
        width: 100%;
      }

      .bar-right {
        justify-content: flex-start;
      }

      .archive-select {
        width: min(100%, 360px);
      }
    }

    @media (max-width: 520px) {
      :root {
        --tile-min: 140px;
      }

      .drop-title {
        font-size: 24px;
      }

      .viewer-scroll.one {
        padding: 12px;
      }

      .viewer-hints {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div id="drop">
    <div class="drop-inner">
      <div class="drop-title">Drag ZIPs or a folder here</div>
      <div class="drop-sub">
        Images are decompressed entirely in your browser. ZIPs are loaded one archive at a time.
      </div>
      <div class="drop-actions">
        <button id="openZipBtn" type="button">Open ZIP</button>
        <button id="openFolderBtn" type="button">Open Folder</button>
      </div>
      <div id="dropStatus" class="drop-status"></div>
      <div class="drop-foot">
        Left-click zooms in. Right-click goes back. Wheel or arrows change images. [ and ] change archives.
      </div>
      <input id="fileInput" type="file" accept=".zip,application/zip,application/x-zip-compressed" multiple hidden>
      <input id="folderInput" type="file" webkitdirectory multiple hidden>
    </div>
  </div>

  <header id="bar" class="bar hidden">
    <div class="bar-left">
      <span class="title">ZIP Image Viewer</span>
      <span id="status" class="status"></span>
    </div>
    <div class="bar-right">
      <button id="barOpenZipBtn" type="button">Open ZIP</button>
      <button id="barOpenFolderBtn" type="button">Open Folder</button>
      <div id="archiveControls" class="archive-controls hidden">
        <button id="prevArchiveBtn" class="icon-button" type="button" title="Previous archive">[</button>
        <select id="archiveSelect" class="archive-select" aria-label="Archive"></select>
        <button id="nextArchiveBtn" class="icon-button" type="button" title="Next archive">]</button>
      </div>
      <button id="resetBtn" type="button" title="Escape">Reset</button>
    </div>
  </header>

  <main id="grid" class="grid hidden" aria-label="Images"></main>

  <div id="viewer" class="viewer hidden" role="dialog" aria-modal="true" aria-label="Image viewer">
    <div id="viewerScroll" class="viewer-scroll fit">
      <img id="viewerImg" alt="" draggable="false">
    </div>
    <div class="hud">
      <div id="viewerInfo" class="viewer-info"></div>
      <div class="viewer-hints">L-click: 1:1 | R-click: back | Esc: reset</div>
    </div>
  </div>

  <script type="module">
    const elDrop = document.getElementById("drop");
    const elDropStatus = document.getElementById("dropStatus");
    const elOpenZipBtn = document.getElementById("openZipBtn");
    const elOpenFolderBtn = document.getElementById("openFolderBtn");
    const elFileInput = document.getElementById("fileInput");
    const elFolderInput = document.getElementById("folderInput");

    const elBar = document.getElementById("bar");
    const elStatus = document.getElementById("status");
    const elBarOpenZipBtn = document.getElementById("barOpenZipBtn");
    const elBarOpenFolderBtn = document.getElementById("barOpenFolderBtn");
    const elArchiveControls = document.getElementById("archiveControls");
    const elArchiveSelect = document.getElementById("archiveSelect");
    const elPrevArchiveBtn = document.getElementById("prevArchiveBtn");
    const elNextArchiveBtn = document.getElementById("nextArchiveBtn");
    const elResetBtn = document.getElementById("resetBtn");

    const elGrid = document.getElementById("grid");
    const elViewer = document.getElementById("viewer");
    const elViewerScroll = document.getElementById("viewerScroll");
    const elViewerImg = document.getElementById("viewerImg");
    const elViewerInfo = document.getElementById("viewerInfo");

    const ZIP_RE = /\.zip$/i;
    const IMAGE_RE = /\.(jpe?g|png|webp|gif|bmp|avif)$/i;
    const collator = new Intl.Collator(undefined, { numeric: true, sensitivity: "base" });

    const state = {
      archives: /** @type {Array<{name: string, path: string, file: File}>} */ ([]),
      archiveIndex: -1,
      images: /** @type {Array<{name: string, blob: Blob, type: string, size: number, thumbUrl: string | null}>} */ ([]),
      io: /** @type {IntersectionObserver | null} */ (null),
      thumbQueue: createTaskQueue(getDecodeConcurrency()),
      abort: new AbortController(),
      viewerIndex: /** @type {number | null} */ (null),
      viewerMode: /** @type {"fit" | "one"} */ ("fit"),
      viewerUrl: /** @type {string | null} */ (null),
      loadToken: 0,
      pointerLocked: false,
    };

    let fflatePromise = null;

    elOpenZipBtn.addEventListener("click", openZipPicker);
    elBarOpenZipBtn.addEventListener("click", openZipPicker);
    elOpenFolderBtn.addEventListener("click", openFolderPicker);
    elBarOpenFolderBtn.addEventListener("click", openFolderPicker);
    elResetBtn.addEventListener("click", () => hardReset());

    elFileInput.addEventListener("change", () => {
      const files = Array.from(elFileInput.files || []);
      elFileInput.value = "";
      if (files.length) loadArchives(filesToArchives(files), "Selected ZIPs");
    });

    elFolderInput.addEventListener("change", () => {
      const files = Array.from(elFolderInput.files || []);
      elFolderInput.value = "";
      if (files.length) loadArchives(filesToArchives(files), "Selected folder");
    });

    elArchiveSelect.addEventListener("change", () => {
      const idx = Number(elArchiveSelect.value);
      if (Number.isFinite(idx)) loadArchive(idx);
    });

    elPrevArchiveBtn.addEventListener("click", () => navigateArchive(-1));
    elNextArchiveBtn.addEventListener("click", () => navigateArchive(1));

    window.addEventListener("keydown", (e) => {
      const target = /** @type {HTMLElement | null} */ (e.target);
      const typing = target && /^(INPUT|SELECT|TEXTAREA)$/.test(target.tagName);

      if (e.key === "Escape") {
        e.preventDefault();
        safeExitPointerLock();
        hardReset();
        return;
      }

      if (!typing && e.key === "[") {
        e.preventDefault();
        navigateArchive(-1);
        return;
      }

      if (!typing && e.key === "]") {
        e.preventDefault();
        navigateArchive(1);
        return;
      }

      if (state.viewerIndex != null) {
        if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
          e.preventDefault();
          navigateImage(-1);
        } else if (e.key === "ArrowRight" || e.key === "ArrowDown" || e.key === " ") {
          e.preventDefault();
          navigateImage(1);
        }
      }
    });

    let dragDepth = 0;
    window.addEventListener("dragenter", (e) => {
      if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes("Files")) {
        dragDepth++;
        document.body.classList.add("drag-over");
      }
    });

    window.addEventListener("dragleave", () => {
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) document.body.classList.remove("drag-over");
    });

    window.addEventListener("dragover", (e) => {
      e.preventDefault();
    });

    window.addEventListener("drop", async (e) => {
      e.preventDefault();
      dragDepth = 0;
      document.body.classList.remove("drag-over");
      await handleDrop(e);
    });

    elGrid.addEventListener("click", (e) => {
      const tile = e.target && /** @type {HTMLElement} */ (e.target).closest(".tile");
      if (!tile) return;
      const idx = Number(tile.dataset.index);
      if (Number.isFinite(idx)) openViewer(idx);
    });

    window.addEventListener("contextmenu", (e) => {
      e.preventDefault();
    });

    elViewer.addEventListener("click", (e) => {
      if (state.viewerIndex == null || state.viewerMode !== "fit") return;
      const imgRect = elViewerImg.getBoundingClientRect();
      const relX = clamp((e.clientX - imgRect.left) / imgRect.width, 0, 1);
      const relY = clamp((e.clientY - imgRect.top) / imgRect.height, 0, 1);
      setViewerMode("one", { relX, relY, clientX: e.clientX, clientY: e.clientY });
      capturePointerForPan();
    });

    elViewer.addEventListener("contextmenu", (e) => {
      if (state.viewerIndex == null) return;
      e.preventDefault();
      safeExitPointerLock();
      if (state.viewerMode === "one") setViewerMode("fit");
      else closeViewer();
    });

    elViewer.addEventListener("mousedown", (e) => {
      if (state.viewerIndex == null || e.button !== 2) return;
      e.preventDefault();
      safeExitPointerLock();
      if (state.viewerMode === "one") setViewerMode("fit");
      else closeViewer();
    });

    elViewerImg.addEventListener("dragstart", (e) => e.preventDefault());

    elViewer.addEventListener("wheel", (e) => {
      if (state.viewerIndex == null) return;
      e.preventDefault();
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        navigateImage(e.deltaY > 0 ? 1 : -1);
      }
    }, { passive: false });

    document.addEventListener("pointerlockchange", () => {
      state.pointerLocked = (document.pointerLockElement === elViewerScroll);
      elViewerScroll.classList.toggle("locked", state.pointerLocked);
    });

    document.addEventListener("mousemove", (e) => {
      if (!state.pointerLocked || state.viewerMode !== "one") return;
      elViewerScroll.scrollLeft += e.movementX;
      elViewerScroll.scrollTop += e.movementY;
    });

    warmFflate();

    function openZipPicker() {
      elFileInput.click();
    }

    async function openFolderPicker() {
      if ("showDirectoryPicker" in window) {
        try {
          const handle = await window.showDirectoryPicker();
          setDropStatus(`Scanning "${handle.name}"...`);
          const archives = [];
          await collectZipsFromHandle(handle, "", archives);
          await loadArchives(archives, handle.name);
          return;
        } catch (err) {
          if (err && err.name === "AbortError") return;
          setDropStatus(`Could not open folder picker: ${stringifyErr(err)}`);
        }
      }
      elFolderInput.click();
    }

    async function handleDrop(e) {
      const dataTransfer = e.dataTransfer;
      if (!dataTransfer) return;

      setDropStatus("Scanning dropped items...");
      elDrop.classList.add("loading");

      try {
        const archives = await archivesFromDataTransfer(dataTransfer);
        await loadArchives(archives, "Dropped items");
      } catch (err) {
        setDropStatus(`Drop failed: ${stringifyErr(err)}`);
      } finally {
        elDrop.classList.remove("loading");
      }
    }

    async function loadArchives(archives, label) {
      const zips = archives
        .filter((archive) => archive && ZIP_RE.test(archive.name || archive.path || ""))
        .sort((a, b) => collator.compare(a.path, b.path));

      if (!zips.length) {
        setDropStatus("No .zip files found.");
        setBarStatus("No .zip files found.");
        elDrop.classList.remove("loading");
        return;
      }

      hardReset({ keepOverlayVisible: true });
      state.archives = zips;
      state.archiveIndex = -1;
      updateArchiveControls();
      setDropStatus(`${label}: found ${zips.length} ZIP${zips.length === 1 ? "" : "s"}.`);
      await loadArchive(0);
    }

    async function loadArchive(idx) {
      if (idx < 0 || idx >= state.archives.length) return;

      const myToken = ++state.loadToken;
      const archive = state.archives[idx];
      state.archiveIndex = idx;

      clearCurrentImages();
      updateArchiveControls();
      showBusy(`Reading "${archive.path}" (${formatBytes(archive.file.size)})...`);

      let buf;
      try {
        buf = await archive.file.arrayBuffer();
      } catch (err) {
        showLoadError(`Failed to read ZIP: ${stringifyErr(err)}`);
        return;
      }

      if (myToken !== state.loadToken) return;

      setDropStatus("Loading unzipper...");
      let out;
      try {
        out = await unzipAsync(new Uint8Array(buf));
      } catch (err) {
        showLoadError(`Unzip error: ${stringifyErr(err)}`);
        return;
      }

      if (myToken !== state.loadToken) return;

      const names = Object.keys(out)
        .filter(isSupportedImageName)
        .sort((a, b) => collator.compare(a, b));

      if (!names.length) {
        showLoadError("No supported images found in this ZIP.");
        return;
      }

      setDropStatus(`Preparing ${names.length} image${names.length === 1 ? "" : "s"}...`);

      const images = [];
      for (const name of names) {
        const u8 = out[name];
        if (!u8 || !u8.byteLength) continue;
        const type = mimeFromName(name);
        const blob = new Blob([u8], { type });
        images.push({ name, blob, type, size: blob.size, thumbUrl: null });
      }

      if (myToken !== state.loadToken) return;

      if (!images.length) {
        showLoadError("Found image filenames, but extracted data was empty.");
        return;
      }

      state.images = images;
      elDrop.classList.remove("loading");
      elDrop.classList.add("hidden");
      elBar.classList.remove("hidden");
      elGrid.classList.remove("hidden");
      updateArchiveControls();
      setBarStatus(`${images.length} image${images.length === 1 ? "" : "s"} in ${archive.path}`);
      renderGrid();
    }

    function showBusy(message) {
      elDrop.classList.add("loading");
      elDrop.classList.remove("hidden");
      elBar.classList.toggle("hidden", state.archives.length === 0);
      elGrid.classList.add("hidden");
      setDropStatus(message);
      setBarStatus(message);
    }

    function showLoadError(message) {
      elDrop.classList.remove("loading");
      elDrop.classList.add("hidden");
      elBar.classList.toggle("hidden", state.archives.length === 0);
      elGrid.classList.add("hidden");
      setDropStatus(message);
      setBarStatus(message);
      updateArchiveControls();
    }

    function renderGrid() {
      state.abort.abort();
      state.abort = new AbortController();
      state.thumbQueue.clear();

      elGrid.textContent = "";
      const frag = document.createDocumentFragment();

      for (let i = 0; i < state.images.length; i++) {
        const info = state.images[i];

        const tile = document.createElement("button");
        tile.type = "button";
        tile.className = "tile";
        tile.dataset.index = String(i);
        tile.title = info.name;

        const thumb = document.createElement("div");
        thumb.className = "thumb skeleton";

        const img = document.createElement("img");
        img.alt = "";
        img.decoding = "async";
        img.loading = "lazy";
        thumb.appendChild(img);

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = baseName(info.name);

        tile.append(thumb, label);
        frag.appendChild(tile);
      }

      elGrid.appendChild(frag);

      if (state.io) state.io.disconnect();
      state.io = new IntersectionObserver(onGridIntersect, {
        root: null,
        rootMargin: "400px",
        threshold: 0.01,
      });

      for (const tile of elGrid.querySelectorAll(".tile")) {
        state.io.observe(tile);
      }
    }

    function onGridIntersect(entries) {
      for (const entry of entries) {
        if (!entry.isIntersecting) continue;
        const tile = /** @type {HTMLElement} */ (entry.target);
        if (state.io) state.io.unobserve(tile);
        const idx = Number(tile.dataset.index);
        if (Number.isFinite(idx)) scheduleThumb(idx, tile);
      }
    }

    function scheduleThumb(idx, tile) {
      const signal = state.abort.signal;

      state.thumbQueue.enqueue(async () => {
        if (signal.aborted) return;
        const info = state.images[idx];
        if (!info) return;

        if (info.thumbUrl) {
          applyThumb(tile, info.thumbUrl);
          return;
        }

        try {
          const thumbUrl = await makeThumbURL(info.blob, tile, signal);
          if (signal.aborted) {
            URL.revokeObjectURL(thumbUrl);
            return;
          }
          info.thumbUrl = thumbUrl;
          applyThumb(tile, thumbUrl);
        } catch {
          tile.classList.add("broken");
          const thumb = tile.querySelector(".thumb");
          if (thumb) thumb.classList.remove("skeleton");
        }
      });
    }

    function applyThumb(tile, url) {
      const img = tile.querySelector("img");
      if (!img || img.src === url) return;
      img.src = url;
      const thumb = tile.querySelector(".thumb");
      if (thumb) thumb.classList.remove("skeleton");
    }

    function openViewer(idx) {
      if (!Number.isFinite(idx) || idx < 0 || idx >= state.images.length) return;
      closeViewer();

      state.viewerIndex = idx;
      state.viewerMode = "fit";

      const info = state.images[idx];
      state.viewerUrl = URL.createObjectURL(info.blob);
      elViewerImg.src = state.viewerUrl;
      elViewer.classList.remove("hidden");
      document.body.classList.add("viewer-open");

      setViewerMode("fit");
    }

    function setViewerMode(mode, clickInfo) {
      state.viewerMode = mode;

      elViewerScroll.classList.toggle("fit", mode === "fit");
      elViewerScroll.classList.toggle("one", mode === "one");

      if (mode !== "one") safeExitPointerLock();
      if (mode !== "one") {
        elViewerImg.style.marginLeft = "";
        elViewerImg.style.marginRight = "";
        elViewerImg.style.marginTop = "";
        elViewerImg.style.marginBottom = "";
      }

      elViewerScroll.scrollTop = 0;
      elViewerScroll.scrollLeft = 0;
      updateViewerInfo();

      if (mode === "one") {
        scheduleOneToOneLayout(() => {
          if (clickInfo) {
            const layout = applyOneToOneLayout();
            const scrollerRect = elViewerScroll.getBoundingClientRect();
            const localX = clickInfo.clientX - scrollerRect.left;
            const localY = clickInfo.clientY - scrollerRect.top;
            elViewerScroll.scrollLeft = clamp(
              layout.offsetX + clickInfo.relX * layout.imgW - localX,
              0,
              layout.maxScrollLeft,
            );
            elViewerScroll.scrollTop = clamp(
              layout.offsetY + clickInfo.relY * layout.imgH - localY,
              0,
              layout.maxScrollTop,
            );
          } else {
            centerOneToOneView();
          }
        });
      }
    }

    function scheduleOneToOneLayout(callback) {
      const viewerUrl = state.viewerUrl;
      const run = () => {
        requestAnimationFrame(() => {
          if (state.viewerMode !== "one" || state.viewerUrl !== viewerUrl) return;
          callback();
        });
      };

      if (elViewerImg.complete && elViewerImg.naturalWidth) {
        run();
      } else {
        elViewerImg.addEventListener("load", run, { once: true });
      }
    }

    function applyOneToOneLayout() {
      const style = getComputedStyle(elViewerScroll);
      const paddingLeft = parseFloat(style.paddingLeft) || 0;
      const paddingRight = parseFloat(style.paddingRight) || 0;
      const paddingTop = parseFloat(style.paddingTop) || 0;
      const paddingBottom = parseFloat(style.paddingBottom) || 0;
      const imgW = elViewerImg.naturalWidth || elViewerImg.width;
      const imgH = elViewerImg.naturalHeight || elViewerImg.height;
      const freeX = Math.max(0, elViewerScroll.clientWidth - paddingLeft - paddingRight - imgW);
      const freeY = Math.max(0, elViewerScroll.clientHeight - paddingTop - paddingBottom - imgH);
      const marginX = freeX / 2;
      const marginY = freeY / 2;

      elViewerImg.style.marginLeft = `${marginX}px`;
      elViewerImg.style.marginRight = `${marginX}px`;
      elViewerImg.style.marginTop = `${marginY}px`;
      elViewerImg.style.marginBottom = `${marginY}px`;

      return {
        imgW,
        imgH,
        offsetX: paddingLeft + marginX,
        offsetY: paddingTop + marginY,
        maxScrollLeft: Math.max(0, elViewerScroll.scrollWidth - elViewerScroll.clientWidth),
        maxScrollTop: Math.max(0, elViewerScroll.scrollHeight - elViewerScroll.clientHeight),
      };
    }

    function centerOneToOneView() {
      applyOneToOneLayout();
      elViewerScroll.scrollLeft = Math.max(0, (elViewerScroll.scrollWidth - elViewerScroll.clientWidth) / 2);
      elViewerScroll.scrollTop = Math.max(0, (elViewerScroll.scrollHeight - elViewerScroll.clientHeight) / 2);
    }

    function capturePointerForPan() {
      if (state.viewerMode !== "one") return;
      if (!("requestPointerLock" in elViewerScroll)) return;
      try { elViewerScroll.requestPointerLock(); } catch {}
    }

    function safeExitPointerLock() {
      if (document.pointerLockElement) {
        try { document.exitPointerLock(); } catch {}
      }
    }

    function updateViewerInfo() {
      if (state.viewerIndex == null) {
        elViewerInfo.textContent = "";
        return;
      }
      const archive = state.archives[state.archiveIndex];
      const info = state.images[state.viewerIndex];
      const mode = state.viewerMode === "fit" ? "fit" : "1:1";
      const archivePart = archive ? `${archive.path} | ` : "";
      elViewerInfo.textContent = `${state.viewerIndex + 1}/${state.images.length} | ${archivePart}${info.name} | ${mode}`;
    }

    function navigateImage(delta) {
      if (state.viewerIndex == null || !state.images.length) return;

      let newIndex = state.viewerIndex + delta;
      if (newIndex < 0) newIndex = state.images.length - 1;
      if (newIndex >= state.images.length) newIndex = 0;

      if (state.viewerUrl) URL.revokeObjectURL(state.viewerUrl);

      state.viewerIndex = newIndex;
      const info = state.images[newIndex];
      state.viewerUrl = URL.createObjectURL(info.blob);
      elViewerImg.src = state.viewerUrl;

      if (state.viewerMode === "one") {
        scheduleOneToOneLayout(() => centerOneToOneView());
      }

      updateViewerInfo();
    }

    function closeViewer() {
      safeExitPointerLock();
      if (state.viewerUrl) {
        elViewerImg.src = "";
        URL.revokeObjectURL(state.viewerUrl);
        state.viewerUrl = null;
      }
      state.viewerIndex = null;
      state.viewerMode = "fit";
      elViewer.classList.add("hidden");
      document.body.classList.remove("viewer-open");
      updateViewerInfo();
    }

    function navigateArchive(delta) {
      if (state.archives.length < 2) return;
      const next = (state.archiveIndex + delta + state.archives.length) % state.archives.length;
      loadArchive(next);
    }

    function updateArchiveControls() {
      const hasArchives = state.archives.length > 0;
      const hasMultiple = state.archives.length > 1;
      elArchiveControls.classList.toggle("hidden", !hasArchives);
      elArchiveSelect.disabled = !hasMultiple;
      elPrevArchiveBtn.disabled = !hasMultiple;
      elNextArchiveBtn.disabled = !hasMultiple;

      const expectedOptions = state.archives.length;
      if (elArchiveSelect.options.length !== expectedOptions) {
        elArchiveSelect.textContent = "";
        const frag = document.createDocumentFragment();
        for (let i = 0; i < state.archives.length; i++) {
          const option = document.createElement("option");
          option.value = String(i);
          option.textContent = `${i + 1}/${state.archives.length} ${state.archives[i].path}`;
          frag.appendChild(option);
        }
        elArchiveSelect.appendChild(frag);
      }

      if (state.archiveIndex >= 0) {
        elArchiveSelect.value = String(state.archiveIndex);
      }
    }

    function clearCurrentImages() {
      state.abort.abort();
      state.abort = new AbortController();
      state.thumbQueue.clear();

      if (state.io) {
        state.io.disconnect();
        state.io = null;
      }

      closeViewer();

      for (const img of state.images) {
        if (img.thumbUrl) URL.revokeObjectURL(img.thumbUrl);
      }

      state.images = [];
      elGrid.textContent = "";
      elGrid.classList.add("hidden");
    }

    function hardReset({ keepOverlayVisible = false } = {}) {
      ++state.loadToken;
      clearCurrentImages();
      state.archives = [];
      state.archiveIndex = -1;
      updateArchiveControls();
      elBar.classList.add("hidden");
      setBarStatus("");
      elDrop.classList.remove("loading");
      elDrop.classList.remove("hidden");
      if (!keepOverlayVisible) setDropStatus("");
      document.body.classList.remove("viewer-open", "drag-over");
    }

    async function makeThumbURL(blob, tile, signal) {
      const rect = tile.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const cssSize = clamp(Math.round(rect.width || 200), 140, 360);
      const px = Math.round(cssSize * dpr);

      const bmp = await createImageBitmapSafe(blob);
      if (signal.aborted) {
        bmp.close();
        throw new Error("aborted");
      }

      const canvas = (typeof OffscreenCanvas !== "undefined")
        ? new OffscreenCanvas(px, px)
        : Object.assign(document.createElement("canvas"), { width: px, height: px });

      const ctx = canvas.getContext("2d", { alpha: false });
      if (!ctx) {
        bmp.close();
        throw new Error("No 2D canvas context");
      }

      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      const scale = Math.max(px / bmp.width, px / bmp.height);
      const cropW = Math.min(bmp.width, px / scale);
      const cropH = Math.min(bmp.height, px / scale);
      const sx = Math.max(0, (bmp.width - cropW) / 2);
      const sy = Math.max(0, (bmp.height - cropH) / 2);

      ctx.drawImage(bmp, sx, sy, cropW, cropH, 0, 0, px, px);
      bmp.close();

      const out = await canvasToBlob(canvas, "image/jpeg", 0.82);
      return URL.createObjectURL(out);
    }

    async function createImageBitmapSafe(blob) {
      try { return await createImageBitmap(blob, { imageOrientation: "from-image" }); }
      catch { return await createImageBitmap(blob); }
    }

    function canvasToBlob(canvas, type, quality) {
      if ("convertToBlob" in canvas) return canvas.convertToBlob({ type, quality });
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => (blob ? resolve(blob) : reject(new Error("toBlob failed"))), type, quality);
      });
    }

    async function unzipAsync(u8) {
      const unzip = await loadFflate();
      return new Promise((resolve, reject) => {
        unzip(u8, (err, data) => {
          if (err) reject(err);
          else resolve(data);
        });
      });
    }

    function loadFflate() {
      if (!fflatePromise) {
        fflatePromise = import("https://esm.sh/fflate@0.8.2").then((mod) => mod.unzip);
      }
      return fflatePromise;
    }

    function warmFflate() {
      const warm = () => loadFflate().catch(() => {});
      if ("requestIdleCallback" in window) window.requestIdleCallback(warm, { timeout: 2500 });
      else window.setTimeout(warm, 1200);
    }

    async function archivesFromDataTransfer(dataTransfer) {
      const fileArchives = filesToArchives(Array.from(dataTransfer.files || []));
      const items = Array.from(dataTransfer.items || []);
      const handleArchives = [];
      const handles = await handlesFromDataTransferItems(items);

      for (const handle of handles) {
        await collectZipsFromHandle(handle, "", handleArchives);
      }

      const entries = items
        .map((item) => getEntryFromItem(item))
        .filter(Boolean);

      const entryArchives = [];
      if (entries.length) {
        for (const entry of entries) {
          await collectZipsFromEntry(entry, "", entryArchives);
        }
      }

      return dedupeArchives([...handleArchives, ...entryArchives, ...fileArchives]);
    }

    async function handlesFromDataTransferItems(items) {
      const handles = [];

      for (const item of items) {
        if (!item || item.kind !== "file" || typeof item.getAsFileSystemHandle !== "function") continue;
        try {
          const handle = await item.getAsFileSystemHandle();
          if (handle) handles.push(handle);
        } catch {
          // Fall through to FileSystemEntry/DataTransfer.files below.
        }
      }

      return handles;
    }

    function getEntryFromItem(item) {
      if (!item || item.kind !== "file") return null;
      const getter = item.getAsEntry || item.webkitGetAsEntry;
      if (!getter) return null;
      try { return getter.call(item); }
      catch { return null; }
    }

    async function collectZipsFromEntry(entry, parentPath, archives) {
      const path = parentPath ? `${parentPath}/${entry.name}` : entry.name;

      if (entry.isFile) {
        if (!ZIP_RE.test(entry.name) || isSkippableMacJunk(path)) return;
        try {
          const file = await fileFromEntry(entry);
          archives.push({ name: entry.name, path, file });
        } catch {
          // Some file:// folder drops expose entries that cannot be resolved
          // through FileSystemEntry. Other drag APIs are merged as fallback.
        }
        return;
      }

      if (!entry.isDirectory) return;

      const reader = entry.createReader();
      while (true) {
        let entries;
        try {
          entries = await readEntries(reader);
        } catch {
          break;
        }
        if (!entries.length) break;
        for (const child of entries) {
          await collectZipsFromEntry(child, path, archives);
        }
      }
    }

    function fileFromEntry(entry) {
      return new Promise((resolve, reject) => {
        entry.file(resolve, reject);
      });
    }

    function readEntries(reader) {
      return new Promise((resolve, reject) => {
        reader.readEntries(resolve, reject);
      });
    }

    async function collectZipsFromHandle(handle, parentPath, archives) {
      const path = parentPath ? `${parentPath}/${handle.name}` : handle.name;

      if (handle.kind === "file") {
        if (!ZIP_RE.test(handle.name) || isSkippableMacJunk(path)) return;
        try {
          const file = await handle.getFile();
          archives.push({ name: handle.name, path, file });
        } catch {
          // Ignore unreadable handles and keep scanning siblings.
        }
        return;
      }

      if (handle.kind !== "directory") return;

      for await (const [name, child] of handle.entries()) {
        await collectZipsFromHandle(child, path, archives);
      }
    }

    function filesToArchives(files) {
      return files
        .filter((file) => ZIP_RE.test(file.name) && !isSkippableMacJunk(file.webkitRelativePath || file.name))
        .map((file) => ({
          name: file.name,
          path: file.webkitRelativePath || file.name,
          file,
        }));
    }

    function dedupeArchives(archives) {
      const seen = new Set();
      const out = [];
      for (const archive of archives) {
        const key = `${archive.path}\n${archive.file.name}\n${archive.file.size}\n${archive.file.lastModified}`;
        if (seen.has(key)) continue;
        seen.add(key);
        out.push(archive);
      }
      return out;
    }

    function isSkippableMacJunk(name) {
      if (!name) return true;
      if (name.startsWith("__MACOSX/") || name.includes("/__MACOSX/")) return true;
      return baseName(name).startsWith("._");
    }

    function isSupportedImageName(name) {
      if (!name || name.endsWith("/") || !IMAGE_RE.test(name)) return false;
      return !isSkippableMacJunk(name);
    }

    function createTaskQueue(concurrency) {
      let active = 0;
      const q = [];

      const runNext = () => {
        if (active >= concurrency || q.length === 0) return;
        const task = q.shift();
        active++;
        Promise.resolve()
          .then(() => task.fn())
          .then(task.resolve, task.reject)
          .finally(() => {
            active--;
            runNext();
          });
      };

      return {
        enqueue(fn) {
          return new Promise((resolve, reject) => {
            q.push({ fn, resolve, reject });
            runNext();
          });
        },
        clear() {
          q.length = 0;
        },
      };
    }

    function getDecodeConcurrency() {
      const hc = navigator.hardwareConcurrency || 8;
      return clamp(Math.floor(hc / 2), 2, 8);
    }

    function mimeFromName(name) {
      const ext = (name.split(".").pop() || "").toLowerCase();
      switch (ext) {
        case "jpg":
        case "jpeg": return "image/jpeg";
        case "png": return "image/png";
        case "webp": return "image/webp";
        case "gif": return "image/gif";
        case "bmp": return "image/bmp";
        case "avif": return "image/avif";
        default: return "application/octet-stream";
      }
    }

    function baseName(path) {
      const parts = String(path).split("/");
      return parts[parts.length - 1] || path;
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes) || bytes <= 0) return "0 B";
      const units = ["B", "KB", "MB", "GB"];
      let value = bytes;
      let idx = 0;
      while (value >= 1024 && idx < units.length - 1) {
        value /= 1024;
        idx++;
      }
      const digits = idx === 0 ? 0 : idx === 1 ? 1 : 2;
      return `${value.toFixed(digits)} ${units[idx]}`;
    }

    function clamp(value, low, high) {
      return Math.max(low, Math.min(high, value));
    }

    function stringifyErr(err) {
      if (!err) return "Unknown error";
      if (typeof err === "string") return err;
      if (err instanceof Error) return err.message || String(err);
      return String(err);
    }

    function setDropStatus(msg) {
      elDropStatus.textContent = msg || "";
    }

    function setBarStatus(msg) {
      elStatus.textContent = msg || "";
    }
  </script>
</body>
</html>
