<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seabed — kelp forest screensaver</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #04141a; }
  canvas { display: block; }
  body.idle { cursor: none; }
  #err {
    position: fixed; inset: 0; display: none; place-items: center;
    color: #9fc8c4; font: 16px/1.5 system-ui, sans-serif; text-align: center;
  }
</style>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
</script>
</head>
<body>
<div id="err">This screensaver needs WebGL2.<br>Try a recent desktop browser.</div>
<script type="module">
import * as THREE from 'three';

/* ============================================================
   Seabed — a procedural kelp-forest "animated photograph".
   Everything is generated in shaders: no textures, no assets.
   ============================================================ */

// ---------- seeded RNG ----------
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ---------- shared GLSL chunks ----------
const GLSL_NOISE = /* glsl */`
float hash12(vec2 p) {
  vec3 p3 = fract(vec3(p.xyx) * 0.1031);
  p3 += dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);
}
float vnoise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash12(i);
  float b = hash12(i + vec2(1.0, 0.0));
  float c = hash12(i + vec2(0.0, 1.0));
  float d = hash12(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++) {
    v += a * vnoise(p);
    p = p * 2.03 + vec2(17.3, 9.1);
    a *= 0.5;
  }
  return v;
}
`;

// Classic tileable water caustic (after Dave Hoskins), warped uv breaks tiling.
const GLSL_CAUSTIC = /* glsl */`
float caustic(vec2 uv, float t) {
  vec2 p = mod(uv * 6.28318530718, 6.28318530718) - 250.0;
  vec2 i = vec2(p);
  float c = 1.0;
  float inten = 0.005;
  for (int n = 0; n < 4; n++) {
    float tt = t * (1.0 - (3.5 / float(n + 1)));
    i = p + vec2(cos(tt - i.x) + sin(tt + i.y), sin(tt - i.y) + cos(tt + i.x));
    c += 1.0 / length(vec2(p.x / (sin(i.x + tt) / inten), p.y / (cos(i.y + tt) / inten)));
  }
  c /= 4.0;
  c = 1.17 - pow(c, 1.4);
  return pow(abs(c), 8.0);
}
`;

// Wavelength-dependent absorption + distance haze. Reds die first.
const GLSL_WATER = /* glsl */`
uniform vec3 uCamPos;
uniform vec3 uWaterHi;
uniform vec3 uWaterLo;
uniform float uFogDensity;
vec3 waterFog(vec3 col, vec3 wp) {
  float dist = length(wp - uCamPos);
  col *= exp(-dist * vec3(0.16, 0.055, 0.04));
  float f = exp(-dist * uFogDensity);
  float hf = clamp(wp.y * 0.05 + 0.45, 0.0, 1.0);
  vec3 fogCol = mix(uWaterLo, uWaterHi, hf);
  return mix(fogCol, col, f);
}
`;

// Seabed dune field — mirrored 1:1 in JS for object placement.
const GLSL_DUNE = /* glsl */`
uniform vec4 uSeeds;
uniform float uSeed2;
float duneH(vec2 p) {
  vec2 q = p + vec2(1.6 * sin(p.y * 0.13 + uSeeds.x), 1.9 * sin(p.x * 0.11 + uSeeds.y));
  return 0.85 * sin(q.x * 0.21 + uSeeds.z) * sin(q.y * 0.17 + uSeeds.w)
       + 0.30 * sin(q.x * 0.42 + q.y * 0.35 + uSeed2);
}
`;

// ---------- renderer ----------
let renderer;
try {
  renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  throw e;
}
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 200);

let renderTarget = new THREE.WebGLRenderTarget(
  renderer.domElement.width, renderer.domElement.height,
  { type: THREE.HalfFloatType, samples: 4 }
);

// ---------- shared uniforms (referenced by every material) ----------
const shared = {
  uTime:       { value: 0 },
  uCamPos:     { value: new THREE.Vector3() },
  uSunDir:     { value: new THREE.Vector3(0.2, 0.9, -0.4).normalize() },
  uWaterHi:    { value: new THREE.Color() },
  uWaterLo:    { value: new THREE.Color() },
  uFogDensity: { value: 0.05 },
  uCurrent:    { value: new THREE.Vector2(1, 0) },
  uSeeds:      { value: new THREE.Vector4() },
  uSeed2:      { value: 0 },
  uRipDir:     { value: 0 },
  uPulse:      { value: 1 },   // slow global light modulation (passing swell)
};

// ---------- world state ----------
let scene = null;
let fishes = [];
let duneSeeds = [0, 0, 0, 0, 0];
let camBase = new THREE.Vector3(0, 2.4, 7);

function duneHeight(x, z) {
  const S = duneSeeds;
  const qx = x + 1.6 * Math.sin(z * 0.13 + S[0]);
  const qz = z + 1.9 * Math.sin(x * 0.11 + S[1]);
  return 0.85 * Math.sin(qx * 0.21 + S[2]) * Math.sin(qz * 0.17 + S[3])
       + 0.30 * Math.sin(qx * 0.42 + qz * 0.35 + S[4]);
}

// ============================================================
// Materials
// ============================================================

function makeDomeMaterial() {
  return new THREE.ShaderMaterial({
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: {
      uTime: shared.uTime, uCamPos: shared.uCamPos, uSunDir: shared.uSunDir,
      uWaterHi: shared.uWaterHi, uWaterLo: shared.uWaterLo, uPulse: shared.uPulse,
    },
    vertexShader: /* glsl */`
      varying vec3 vWorld;
      void main() {
        vWorld = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying vec3 vWorld;
      uniform vec3 uCamPos, uSunDir, uWaterHi, uWaterLo;
      uniform float uTime, uPulse;
      ${GLSL_NOISE}
      void main() {
        vec3 dir = normalize(vWorld - uCamPos);
        float up = dir.y;
        vec3 col = mix(uWaterLo, uWaterHi, smoothstep(-0.55, 0.8, up));
        col = mix(col, uWaterLo * 0.55, smoothstep(-0.05, -0.7, up));
        // sun disc glow, softened by depth
        float sd = max(dot(dir, uSunDir), 0.0);
        col += vec3(0.30, 0.52, 0.47) * pow(sd, 16.0) * 1.3 * uPulse;
        col += vec3(0.08, 0.18, 0.17) * pow(sd, 4.0) * 0.6;
        // the undulating surface seen from below, near the zenith
        vec2 sp = dir.xz / max(up, 0.16);
        float sh = fbm(sp * 2.2 + uTime * 0.055) - 0.5;
        float sh2 = fbm(sp * 5.1 - uTime * 0.045) - 0.5;
        col += vec3(0.18, 0.33, 0.30) * smoothstep(0.30, 0.85, up) * (sh * 0.9 + sh2 * 0.55);
        // slow passing swell dims the whole column
        col *= 0.92 + 0.12 * fbm(dir.xz * 2.5 - uTime * 0.05);
        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
}

function makeSandMaterial() {
  return new THREE.ShaderMaterial({
    uniforms: {
      uTime: shared.uTime, uCamPos: shared.uCamPos, uSunDir: shared.uSunDir,
      uWaterHi: shared.uWaterHi, uWaterLo: shared.uWaterLo, uFogDensity: shared.uFogDensity,
      uSeeds: shared.uSeeds, uSeed2: shared.uSeed2, uRipDir: shared.uRipDir,
      uCurrent: shared.uCurrent, uPulse: shared.uPulse,
    },
    vertexShader: /* glsl */`
      varying vec3 vWorld;
      uniform vec4 uSeeds;
      uniform float uSeed2, uRipDir;
      ${GLSL_NOISE}
      float duneHv(vec2 p) {
        vec2 q = p + vec2(1.6 * sin(p.y * 0.13 + uSeeds.x), 1.9 * sin(p.x * 0.11 + uSeeds.y));
        return 0.85 * sin(q.x * 0.21 + uSeeds.z) * sin(q.y * 0.17 + uSeeds.w)
             + 0.30 * sin(q.x * 0.42 + q.y * 0.35 + uSeed2);
      }
      float rippleHv(vec2 p) {
        float w = fbm(p * 0.30) * 5.0;
        vec2 rd = vec2(cos(uRipDir), sin(uRipDir));
        float s1 = 1.0 - abs(sin(dot(p, rd) * 2.6 + w));
        return (s1 - 0.5) * 0.06;
      }
      void main() {
        vec3 pos = position;
        vec2 p = (modelMatrix * vec4(pos, 1.0)).xz;
        pos.y += duneHv(p) + rippleHv(p);
        vec4 wp = modelMatrix * vec4(pos, 1.0);
        vWorld = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying vec3 vWorld;
      uniform float uTime, uRipDir, uPulse;
      uniform vec3 uSunDir;
      uniform vec2 uCurrent;
      ${GLSL_NOISE}
      ${GLSL_CAUSTIC}
      ${GLSL_WATER}
      ${GLSL_DUNE}
      float sandH(vec2 p) {
        float w = fbm(p * 0.30) * 5.0;
        vec2 rd = vec2(cos(uRipDir), sin(uRipDir));
        float s1 = 1.0 - abs(sin(dot(p, rd) * 2.6 + w));
        float s2 = 1.0 - abs(sin(dot(p, rd) * 5.3 + w * 1.7 + 1.3));
        float det = (fbm(p * 1.6) - 0.5) * 0.10 + (vnoise(p * 6.0) - 0.5) * 0.03;
        return duneH(p) + (s1 - 0.5) * 0.06 + (s2 - 0.5) * 0.022 + det;
      }
      void main() {
        vec2 p = vWorld.xz;
        float e = 0.06;
        float h0 = sandH(p);
        float hx = sandH(p + vec2(e, 0.0));
        float hz = sandH(p + vec2(0.0, e));
        vec3 N = normalize(vec3(-(hx - h0) / e, 1.0, -(hz - h0) / e));

        // albedo: shifting sediment tones + fine grain
        vec3 alb = mix(vec3(0.40, 0.365, 0.285), vec3(0.56, 0.51, 0.40), fbm(p * 0.55));
        alb = mix(alb, vec3(0.27, 0.26, 0.21), smoothstep(0.55, 0.85, fbm(p * 0.13 + 31.7)));
        alb *= 0.90 + 0.20 * hash12(floor(p * 190.0));
        // organic debris flecks
        float fleck = smoothstep(0.965, 1.0, vnoise(p * 22.0));
        alb = mix(alb, vec3(0.13, 0.13, 0.10), fleck * 0.7);

        // lighting: wrapped sun + animated caustic web
        float sun = clamp(dot(N, uSunDir) * 0.7 + 0.3, 0.0, 1.0);
        vec2 cuv = p * 0.35 + (fbm(p * 0.12) - 0.5) * 0.8 + uCurrent * uTime * 0.015;
        float ca = caustic(cuv, uTime * 0.55);
        vec3 light = vec3(0.16, 0.24, 0.235)                       // ambient sky column
                   + vec3(0.75, 0.95, 0.85) * sun * (0.55 + ca * 1.5 * uPulse);
        // troughs collect shade
        light *= 0.82 + 0.18 * smoothstep(-1.1, 1.1, h0);

        vec3 col = alb * light;
        // faint view-dependent grain sparkle
        vec3 V = normalize(uCamPos - vWorld);
        float sp = pow(hash12(floor(p * 320.0) + 7.0), 24.0);
        col += vec3(0.5, 0.6, 0.55) * sp * sun * clamp(dot(N, V), 0.0, 1.0) * 0.35;

        col = waterFog(col, vWorld);
        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
}

function makeKelpMaterial() {
  return new THREE.ShaderMaterial({
    side: THREE.DoubleSide,
    uniforms: {
      uTime: shared.uTime, uCamPos: shared.uCamPos, uSunDir: shared.uSunDir,
      uWaterHi: shared.uWaterHi, uWaterLo: shared.uWaterLo, uFogDensity: shared.uFogDensity,
      uCurrent: shared.uCurrent, uPulse: shared.uPulse,
    },
    vertexShader: /* glsl */`
      attribute vec4 aData; // phase, curl, colorVar, staticLean
      varying vec2 vUv;
      varying vec3 vWorld;
      varying vec3 vNormal;
      varying float vVar;
      varying float vV;
      uniform float uTime;
      uniform vec2 uCurrent;
      void main() {
        vUv = uv;
        vVar = aData.z;
        float v = uv.y;
        vV = v;
        vec3 pos = position;
        float cx = pos.x; // -0.5 .. 0.5 across the blade
        // strap-blade width profile: narrow stipe, broad belly, long pointed tip
        float wprof = mix(0.20, 1.0, smoothstep(0.0, 0.30, v))
                    * (1.0 - smoothstep(0.35, 1.0, v) * 0.96);
        pos.x *= wprof;
        // rolled cross-section so the blade catches light across its width
        float curlAmt = aData.y;
        pos.z += (cx * cx - 0.0833) * curlAmt;
        vec3 nLocal = normalize(vec3(-2.0 * cx * curlAmt, 0.0, 1.0));
        vec4 wp4 = instanceMatrix * vec4(pos, 1.0);
        vec3 wp = wp4.xyz;
        float hS = length(vec3(instanceMatrix[0][1], instanceMatrix[1][1], instanceMatrix[2][1]));
        float ph = aData.x;
        // coherent current: slow primary surge + secondary slosh
        float sw = sin(uTime * 0.32 + ph) * 0.6 + sin(uTime * 0.117 + ph * 1.7) * 0.4;
        float bend = aData.w + sw * 0.38;
        float fall = pow(v, 1.7);
        wp.xz += uCurrent * bend * fall * hS * 0.55;
        // gentle out-of-current wobble
        wp.xz += vec2(sin(uTime * 0.21 + ph * 2.3), cos(uTime * 0.26 + ph * 1.1)) * fall * hS * 0.05;
        // static S-curve + travelling flutter up the blade
        vec2 perp = vec2(-uCurrent.y, uCurrent.x);
        wp.xz += perp * sin(v * 2.6 + ph * 2.0) * hS * 0.055;
        wp.xz += perp * sin(v * 7.0 - uTime * 0.9 + ph * 3.0) * v * hS * 0.035;
        // heavy tips droop over and ride the surge
        float droop = smoothstep(0.55, 1.0, v);
        droop *= droop;
        wp.y -= droop * hS * (0.22 + 0.10 * sin(uTime * 0.20 + ph));
        wp.xz += uCurrent * droop * hS * 0.16;
        wp.y -= bend * bend * fall * 0.14 * hS;
        vWorld = wp;
        vNormal = normalize(mat3(instanceMatrix) * nLocal);
        gl_Position = projectionMatrix * viewMatrix * vec4(wp, 1.0);
      }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying vec2 vUv;
      varying vec3 vWorld;
      varying vec3 vNormal;
      varying float vVar;
      varying float vV;
      uniform float uTime, uPulse;
      uniform vec3 uSunDir;
      ${GLSL_NOISE}
      ${GLSL_CAUSTIC}
      ${GLSL_WATER}
      void main() {
        vec3 base = mix(vec3(0.028, 0.060, 0.012), vec3(0.080, 0.100, 0.024), vVar);
        // lengthwise striations and blotching
        float st = 0.85 + 0.30 * vnoise(vec2(vUv.x * 9.0, vUv.y * 60.0) + vVar * 11.0);
        float blotch = fbm(vec2(vUv.x * 3.0, vUv.y * 14.0) + vVar * 7.0);
        base *= st * (0.75 + 0.55 * blotch);

        // canopy shading: dark at holdfast, sunlit near the tips
        float depthLight = mix(0.28, 1.15, vV * vV * 0.7 + vV * 0.3);
        float ca = caustic(vWorld.xz * 0.40 + vWorld.y * 0.09, uTime * 0.5 + 2.0) * uPulse;

        vec3 V = normalize(uCamPos - vWorld);
        vec3 N = normalize(vNormal) * (gl_FrontFacing ? 1.0 : -1.0);
        float trans = pow(clamp(1.0 - abs(dot(N, V)), 0.0, 1.0), 1.6);
        float sunFace = clamp(dot(N, uSunDir) * 0.5 + 0.5, 0.0, 1.0);

        vec3 col = base * (0.45 + depthLight * (0.65 + ca * 1.2));
        // amber translucency where light passes through the blade
        col += vec3(0.21, 0.26, 0.055) * trans * depthLight * 0.9;
        col += vec3(0.30, 0.42, 0.16) * pow(sunFace, 3.0) * ca * vV * 0.6;
        // rolled blade edges read darker
        col *= 0.72 + 0.28 * sin(vUv.x * 3.14159);

        col = waterFog(col, vWorld);
        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
}

function makeRockMaterial() {
  return new THREE.ShaderMaterial({
    uniforms: {
      uTime: shared.uTime, uCamPos: shared.uCamPos, uSunDir: shared.uSunDir,
      uWaterHi: shared.uWaterHi, uWaterLo: shared.uWaterLo, uFogDensity: shared.uFogDensity,
      uPulse: shared.uPulse,
    },
    vertexShader: /* glsl */`
      varying vec3 vWorld;
      varying vec3 vNormal;
      void main() {
        vec4 wp = instanceMatrix * vec4(position, 1.0);
        vWorld = wp.xyz;
        vNormal = normalize(mat3(instanceMatrix) * normal);
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying vec3 vWorld;
      varying vec3 vNormal;
      uniform float uTime, uPulse;
      uniform vec3 uSunDir;
      ${GLSL_NOISE}
      ${GLSL_CAUSTIC}
      ${GLSL_WATER}
      void main() {
        vec3 N = normalize(vNormal);
        vec3 base = mix(vec3(0.085, 0.09, 0.085), vec3(0.155, 0.145, 0.115), fbm(vWorld.xz * 2.2 + vWorld.y));
        // algal film creeps over upward faces
        float algae = smoothstep(0.2, 0.9, N.y) * smoothstep(0.35, 0.75, fbm(vWorld.xz * 1.3 + 5.0));
        base = mix(base, vec3(0.055, 0.105, 0.045), algae * 0.8);
        float sun = clamp(dot(N, uSunDir) * 0.6 + 0.4, 0.0, 1.0);
        float ca = caustic(vWorld.xz * 0.35 + 3.0, uTime * 0.55) * clamp(N.y, 0.0, 1.0) * uPulse;
        vec3 light = vec3(0.15, 0.22, 0.21) + vec3(0.75, 0.95, 0.85) * sun * (0.5 + ca * 1.4);
        vec3 col = base * light;
        col = waterFog(col, vWorld);
        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
}

function makeFishMaterial(seed, tint) {
  return new THREE.ShaderMaterial({
    side: THREE.DoubleSide,
    uniforms: {
      uTime: shared.uTime, uCamPos: shared.uCamPos, uSunDir: shared.uSunDir,
      uWaterHi: shared.uWaterHi, uWaterLo: shared.uWaterLo, uFogDensity: shared.uFogDensity,
      uPhase: { value: seed * 37.0 },
      uWig:   { value: 2.0 + seed * 1.6 },
      uSeed:  { value: seed },
      uTint:  { value: tint },
    },
    vertexShader: /* glsl */`
      varying vec2 vUv;
      varying vec3 vWorld;
      varying vec3 vNormal;
      uniform float uTime, uPhase, uWig;
      void main() {
        vUv = uv;
        vec3 pos = position;
        float u = uv.x; // 0 head .. 1 tail
        float bendPh = uTime * uWig + uPhase;
        float amp = 0.015 + 0.10 * smoothstep(0.30, 1.0, u);
        float wave = sin(bendPh - u * 4.2);
        pos.x += wave * amp;
        vec3 n = normalize(vec3(1.0, 0.0, -cos(bendPh - u * 4.2) * amp * 4.2));
        vec4 wp = modelMatrix * vec4(pos, 1.0);
        vWorld = wp.xyz;
        vNormal = normalize(mat3(modelMatrix) * n);
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying vec2 vUv;
      varying vec3 vWorld;
      varying vec3 vNormal;
      uniform float uTime, uSeed;
      uniform vec3 uSunDir, uTint;
      ${GLSL_NOISE}
      ${GLSL_WATER}
      void main() {
        vec2 p = vec2(vUv.x, vUv.y - 0.5);
        // body: ellipse with slightly dropped belly
        vec2 bp = (p - vec2(0.40, 0.01)) / vec2(0.40, 0.150);
        float body = length(bp) - 1.0;
        float aBody = smoothstep(0.03, -0.03, body);
        // forked tail fin
        float tx = clamp((p.x - 0.72) / 0.26, 0.0, 1.0);
        float tw = mix(0.02, 0.15, tx);
        float fork = 0.90 + 0.085 * smoothstep(0.02, 0.15, abs(p.y));
        float aTail = step(0.72, p.x)
                    * smoothstep(tw + 0.012, tw - 0.012, abs(p.y))
                    * smoothstep(fork + 0.012, fork - 0.012, p.x);
        // dorsal fin
        float dx = smoothstep(0.26, 0.34, p.x) * (1.0 - smoothstep(0.52, 0.62, p.x));
        float dh = 0.12 + 0.10 * dx;
        float aDorsal = dx * smoothstep(dh + 0.015, dh - 0.015, p.y) * step(0.09, p.y) * 0.9;
        // small anal fin
        float ax = smoothstep(0.50, 0.56, p.x) * (1.0 - smoothstep(0.64, 0.70, p.x));
        float aAnal = ax * smoothstep(-0.155, -0.125, p.y) * step(p.y, -0.09) * 0.9;

        float alpha = max(max(aBody, aTail), max(aDorsal, aAnal));
        if (alpha < 0.4) discard;

        // counter-shading: dark dorsal fading to bright silver belly
        float dv = clamp(0.5 - p.y * 3.4, 0.0, 1.0);
        vec3 col = mix(vec3(0.045, 0.075, 0.095), vec3(0.50, 0.56, 0.55), dv);
        col *= uTint;
        // lateral line + scale shimmer
        col *= 0.82 + 0.18 * smoothstep(0.015, 0.055, abs(p.y - 0.005));
        col *= 0.90 + 0.20 * vnoise(vec2(p.x * 42.0, p.y * 30.0) + uSeed * 19.0);
        // fins darker + translucent-looking
        float finOnly = max(aTail, max(aDorsal, aAnal)) * (1.0 - aBody);
        col = mix(col, col * 0.5 + vec3(0.015, 0.03, 0.03), clamp(finOnly, 0.0, 1.0));
        // eye
        float eye = length(p - vec2(0.085, 0.02));
        col = mix(col, vec3(0.75, 0.8, 0.78), smoothstep(0.030, 0.023, eye));
        col = mix(col, vec3(0.015), smoothstep(0.019, 0.012, eye));
        // gill arc
        float gill = abs(length((p - vec2(0.09, 0.0)) * vec2(1.0, 1.25)) - 0.135);
        col *= 1.0 - 0.22 * smoothstep(0.02, 0.0, gill);
        // silvery flash as the flank tilts through the light
        vec3 N = normalize(vNormal) * (gl_FrontFacing ? 1.0 : -1.0);
        float spec = pow(clamp(abs(dot(N, uSunDir)), 0.0, 1.0), 5.0);
        col += vec3(0.45, 0.55, 0.55) * spec * dv * 0.85;

        col = waterFog(col, vWorld);
        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
}

function makeParticleMaterial() {
  return new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      uTime: shared.uTime, uCamPos: shared.uCamPos, uCurrent: shared.uCurrent,
      uBox: { value: new THREE.Vector3(36, 14, 36) },
      uPixelRatio: { value: renderer.getPixelRatio() },
    },
    vertexShader: /* glsl */`
      attribute float aSize;
      attribute float aPhase;
      varying float vAlpha;
      uniform float uTime, uPixelRatio;
      uniform vec3 uCamPos, uBox;
      uniform vec2 uCurrent;
      void main() {
        vec3 p = position;
        p.x += uTime * uCurrent.x * 0.22 + sin(uTime * 0.50 + aPhase) * 0.18;
        p.z += uTime * uCurrent.y * 0.22 + cos(uTime * 0.43 + aPhase * 1.31) * 0.18;
        p.y += sin(uTime * 0.31 + aPhase * 2.1) * 0.12;
        // wrap the cloud around the camera so it never runs out
        vec3 hbox = uBox * 0.5;
        vec3 rel = mod(p - uCamPos + hbox, uBox) - hbox;
        p = uCamPos + rel;
        vec4 mv = viewMatrix * vec4(p, 1.0);
        float d = length(mv.xyz);
        gl_PointSize = aSize * uPixelRatio * 90.0 / max(d, 0.5);
        vAlpha = smoothstep(0.5, 2.2, d) * smoothstep(16.0, 8.0, d);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying float vAlpha;
      void main() {
        float a = smoothstep(0.5, 0.12, length(gl_PointCoord - 0.5));
        gl_FragColor = vec4(vec3(0.60, 0.78, 0.75) * a * vAlpha * 0.30, 1.0);
      }
    `,
  });
}

// ============================================================
// Post-processing: god rays, tonemap, chromatic aberration,
// vignette, grain — the "photograph" layer.
// ============================================================
const postUniforms = {
  tScene:  { value: null },
  uRes:    { value: new THREE.Vector2() },
  uTime:   shared.uTime,
  uSunUV:  { value: new THREE.Vector2(0.5, 1.3) },
  uAspect: { value: 1 },
  uPulse:  shared.uPulse,
};
const postScene = new THREE.Scene();
const postCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
{
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(
    new Float32Array([-1, -1, 0, 3, -1, 0, -1, 3, 0]), 3));
  const mat = new THREE.ShaderMaterial({
    uniforms: postUniforms,
    depthTest: false,
    depthWrite: false,
    vertexShader: /* glsl */`
      varying vec2 vUv;
      void main() {
        vUv = position.xy * 0.5 + 0.5;
        gl_Position = vec4(position.xy, 0.0, 1.0);
      }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying vec2 vUv;
      uniform sampler2D tScene;
      uniform vec2 uRes, uSunUV;
      uniform float uTime, uAspect, uPulse;
      float hash12(vec2 p) {
        vec3 p3 = fract(vec3(p.xyx) * 0.1031);
        p3 += dot(p3, p3.yzx + 33.33);
        return fract((p3.x + p3.y) * p3.z);
      }
      void main() {
        vec2 uv = vUv;
        vec2 c = uv - 0.5;
        float r2 = dot(c, c);
        // chromatic aberration, stronger off-axis
        vec2 off = c * (0.0018 + 0.0045 * r2);
        vec3 col;
        col.r = texture2D(tScene, uv - off).r;
        col.g = texture2D(tScene, uv).g;
        col.b = texture2D(tScene, uv + off).b;

        // crepuscular shafts fanning down from the sun point
        vec2 d = uv - uSunUV;
        d.x *= uAspect;
        float ang = atan(d.x, -d.y);
        float dist = length(d);
        float b1 = pow(0.5 + 0.5 * sin(ang * 14.0 + uTime * 0.10 + 2.2 * sin(ang * 3.0 - uTime * 0.05)), 3.0);
        float b2 = pow(0.5 + 0.5 * sin(ang * 27.0 - uTime * 0.14 + 1.7 * sin(ang * 5.0 + uTime * 0.04)), 5.0);
        float rays = (b1 * 0.75 + b2 * 0.5) * exp(-dist * 1.15) * smoothstep(2.0, 0.4, dist) * uPulse;
        col += vec3(0.45, 0.75, 0.70) * rays * 0.22;
        col += vec3(0.35, 0.62, 0.58) * exp(-dist * 2.4) * 0.26 * uPulse;

        // filmic-ish grade
        col = max(col, 0.0);
        col = col / (col + 0.72) * 1.50;
        float lum = dot(col, vec3(0.299, 0.587, 0.114));
        col = mix(vec3(lum), col, 1.12);
        col = col * 0.985 + vec3(0.003, 0.010, 0.014); // cool lift in the blacks
        // vignette
        col *= 1.0 - 0.42 * smoothstep(0.10, 0.62, r2);
        // animated grain, heavier in shadow
        float g = hash12(uv * uRes + vec2(fract(uTime * 13.71) * 191.0, fract(uTime * 7.31) * 131.0));
        col += (g - 0.5) * 0.045 * (1.0 - lum * 0.55);
        // gamma
        col = pow(clamp(col, 0.0, 1.0), vec3(0.4545));
        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
  postScene.add(new THREE.Mesh(geo, mat));
}

// ============================================================
// Scene construction
// ============================================================

function disposeScene(sc) {
  sc.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach(m => m.dispose());
    }
  });
}

function buildScene(seed) {
  if (scene) disposeScene(scene);
  fishes = [];
  const rng = mulberry32(seed);
  scene = new THREE.Scene();

  // --- randomized world parameters ---
  duneSeeds = [rng() * 6.28, rng() * 6.28, rng() * 6.28, rng() * 6.28, rng() * 6.28];
  shared.uSeeds.value.set(duneSeeds[0], duneSeeds[1], duneSeeds[2], duneSeeds[3]);
  shared.uSeed2.value = duneSeeds[4];
  shared.uRipDir.value = rng() * Math.PI;

  const currentAng = rng() * Math.PI * 2;
  shared.uCurrent.value.set(Math.cos(currentAng), Math.sin(currentAng));

  // sun mostly ahead of camera (camera looks toward -z) so shafts land in frame
  const sunAz = Math.PI + (rng() - 0.5) * 1.1;
  const sunEl = 0.72 + rng() * 0.16;
  const ch = Math.sqrt(1 - sunEl * sunEl);
  shared.uSunDir.value.set(Math.sin(sunAz) * ch, sunEl, Math.cos(sunAz) * ch).normalize();

  // water palette: teal with a per-scene hue drift (linear-space colors)
  const hueDrift = (rng() - 0.5) * 0.35;
  shared.uWaterHi.value.setRGB(0.055 + hueDrift * 0.02, 0.235, 0.245 - hueDrift * 0.05);
  shared.uWaterLo.value.setRGB(0.004, 0.030, 0.042 - hueDrift * 0.008);
  shared.uFogDensity.value = 0.046 + rng() * 0.014;

  // --- backdrop dome ---
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(75, 32, 20), makeDomeMaterial()));

  // --- sand ---
  const sand = new THREE.Mesh(new THREE.PlaneGeometry(95, 95, 300, 300), makeSandMaterial());
  sand.geometry.rotateX(-Math.PI / 2);
  scene.add(sand);

  // --- kelp forest ---
  const clusters = [];
  const nClusters = 52 + Math.floor(rng() * 16);
  let attempts = 0;
  while (clusters.length < nClusters && attempts++ < 500) {
    const a = rng() * Math.PI * 2;
    const r = 3.2 + 26 * Math.pow(rng(), 0.78);
    const x = Math.cos(a) * r;
    const z = 7 + Math.sin(a) * r - 7 * rng(); // biased ring around the camera area
    // keep a clear viewing corridor in front of the camera
    if (Math.abs(x) < 2.2 && z < 8.5 && z > -9) continue;
    const dx = x - 0, dz = z - 7;
    if (dx * dx + dz * dz < 7) continue;
    clusters.push({ x, z, phase: rng() * 6.28, n: 5 + Math.floor(rng() * 7), hMul: 1 });
  }
  // near framing blades at the edges of the shot
  const nFrame = 2 + Math.floor(rng() * 2);
  for (let i = 0; i < nFrame; i++) {
    const side = (i % 2 === 0) ? 1 : -1;
    clusters.push({
      x: side * (2.7 + rng() * 1.3),
      z: 4.0 + rng() * 2.5,
      phase: rng() * 6.28,
      n: 2 + Math.floor(rng() * 2),
      hMul: 1.45,
    });
  }
  let bladeCount = 0;
  clusters.forEach(c => bladeCount += c.n);

  const kelpGeo = new THREE.PlaneGeometry(1, 1, 3, 40);
  kelpGeo.translate(0, 0.5, 0);
  const kelp = new THREE.InstancedMesh(kelpGeo, makeKelpMaterial(), bladeCount);
  const aData = new Float32Array(bladeCount * 4);
  const m = new THREE.Matrix4();
  const q = new THREE.Quaternion();
  const eul = new THREE.Euler();
  let bi = 0;
  clusters.forEach(c => {
    for (let i = 0; i < c.n; i++) {
      const ox = (rng() - 0.5) * 1.0;
      const oz = (rng() - 0.5) * 1.0;
      const x = c.x + ox, z = c.z + oz;
      const y = duneHeight(x, z) - 0.12;
      const h = (3.0 + rng() * 3.4) * c.hMul;
      const w = 0.32 + rng() * 0.28;
      eul.set(0, rng() * Math.PI * 2, 0);
      q.setFromEuler(eul);
      m.compose(new THREE.Vector3(x, y, z), q, new THREE.Vector3(w, h, w));
      kelp.setMatrixAt(bi, m);
      aData[bi * 4 + 0] = c.phase + rng() * 0.9;       // sway phase (cluster-coherent)
      aData[bi * 4 + 1] = 0.10 + rng() * 0.30;          // cross-section curl
      aData[bi * 4 + 2] = rng();                        // color variation
      aData[bi * 4 + 3] = 0.15 + rng() * 0.45;          // static lean
      bi++;
    }
  });
  kelpGeo.setAttribute('aData', new THREE.InstancedBufferAttribute(aData, 4));
  kelp.instanceMatrix.needsUpdate = true;
  scene.add(kelp);

  // --- scattered rocks ---
  const nRocks = 18 + Math.floor(rng() * 14);
  const rockGeo = new THREE.IcosahedronGeometry(1, 2);
  {
    // knobble the sphere once; instance rotations vary the silhouettes
    const posAttr = rockGeo.attributes.position;
    const vv = new THREE.Vector3();
    for (let i = 0; i < posAttr.count; i++) {
      vv.fromBufferAttribute(posAttr, i);
      const k = 1.0 + 0.25 * Math.sin(vv.x * 5.1) * Math.sin(vv.y * 4.3) * Math.sin(vv.z * 6.7)
                    + 0.10 * Math.sin(vv.x * 11.0 + vv.z * 9.0);
      posAttr.setXYZ(i, vv.x * k, vv.y * k * 0.72, vv.z * k);
    }
    rockGeo.computeVertexNormals();
  }
  const rocks = new THREE.InstancedMesh(rockGeo, makeRockMaterial(), nRocks);
  for (let i = 0; i < nRocks; i++) {
    const a = rng() * Math.PI * 2;
    const r = 3.5 + 24 * rng();
    const x = Math.cos(a) * r;
    const z = 7 + Math.sin(a) * r - 6 * rng();
    const s = 0.15 + Math.pow(rng(), 1.6) * 0.65;
    const y = duneHeight(x, z) + s * 0.28;
    eul.set(rng() * 0.6, rng() * Math.PI * 2, rng() * 0.6);
    q.setFromEuler(eul);
    m.compose(new THREE.Vector3(x, y, z), q,
      new THREE.Vector3(s * (0.8 + rng() * 0.6), s, s * (0.8 + rng() * 0.6)));
    rocks.setMatrixAt(i, m);
  }
  rocks.instanceMatrix.needsUpdate = true;
  scene.add(rocks);

  // --- marine snow / dust ---
  const nPts = 900;
  const pGeo = new THREE.BufferGeometry();
  const pPos = new Float32Array(nPts * 3);
  const pSize = new Float32Array(nPts);
  const pPhase = new Float32Array(nPts);
  for (let i = 0; i < nPts; i++) {
    pPos[i * 3 + 0] = (rng() - 0.5) * 36;
    pPos[i * 3 + 1] = rng() * 14 - 1;
    pPos[i * 3 + 2] = (rng() - 0.5) * 36;
    pSize[i] = 0.4 + Math.pow(rng(), 2.5) * 3.2;
    pPhase[i] = rng() * 6.28;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  pGeo.setAttribute('aSize', new THREE.BufferAttribute(pSize, 1));
  pGeo.setAttribute('aPhase', new THREE.BufferAttribute(pPhase, 1));
  const pts = new THREE.Points(pGeo, makeParticleMaterial());
  pts.frustumCulled = false;
  scene.add(pts);

  // --- fish ---
  const fishGeoSmall = new THREE.PlaneGeometry(1, 0.36, 24, 1);
  fishGeoSmall.rotateY(Math.PI / 2); // length along Z, head at +Z (lookAt-friendly)
  const fishGeoBig = fishGeoSmall.clone();

  function wanderer(cx, cz, cy, scale) {
    const w1 = 0.035 + rng() * 0.03;
    const w2 = 0.07 + rng() * 0.05;
    const wy = 0.11 + rng() * 0.08;
    const a1 = rng() * 6.28, a2 = rng() * 6.28, a3 = rng() * 6.28, a4 = rng() * 6.28, a5 = rng() * 6.28;
    const r1 = (5 + rng() * 5) * scale;
    const r2 = (1.5 + rng() * 2.5) * scale;
    const ry = 0.5 + rng() * 0.9;
    return (t, out) => {
      out.x = cx + Math.sin(t * w1 + a1) * r1 + Math.sin(t * w2 + a2) * r2;
      out.z = cz + Math.cos(t * w1 * 0.83 + a3) * r1 * 0.85 + Math.sin(t * w2 * 1.31 + a4) * r2;
      out.y = cy + Math.sin(t * wy + a5) * ry + Math.sin(t * wy * 2.7 + a1) * ry * 0.3;
      out.y = Math.max(out.y, duneHeight(out.x, out.z) + 0.6);
      return out;
    };
  }

  // a loose school of small silvery fish
  const schoolPath = wanderer((rng() - 0.5) * 6, -2 - rng() * 6, 2.0 + rng() * 1.2, 0.8);
  const nSchool = 9 + Math.floor(rng() * 5);
  for (let i = 0; i < nSchool; i++) {
    const seed = rng();
    const tint = new THREE.Color(1.0, 1.0, 0.97);
    const mesh = new THREE.Mesh(fishGeoSmall, makeFishMaterial(seed, tint));
    const s = 0.30 + rng() * 0.14;
    mesh.scale.setScalar(s);
    scene.add(mesh);
    fishes.push({
      mesh, path: schoolPath,
      off: new THREE.Vector3((rng() - 0.5) * 2.4, (rng() - 0.5) * 1.4, (rng() - 0.5) * 2.4),
      offPhase: rng() * 6.28, tLag: rng() * 0.6,
    });
  }
  // two larger, darker loners cruising the kelp line
  for (let i = 0; i < 2; i++) {
    const seed = rng();
    const tint = new THREE.Color(0.72, 0.78, 0.72);
    const mesh = new THREE.Mesh(fishGeoBig, makeFishMaterial(seed, tint));
    mesh.scale.setScalar(0.9 + rng() * 0.5);
    scene.add(mesh);
    fishes.push({
      mesh, path: wanderer((rng() - 0.5) * 10, -4 - rng() * 8, 1.6 + rng() * 1.6, 1.1),
      off: new THREE.Vector3(), offPhase: rng() * 6.28, tLag: rng() * 20,
    });
  }

  // --- camera baseline ---
  const camY = duneHeight(0, 7) + 2.35;
  camBase.set(0, camY, 7);
}

// ============================================================
// Animation loop
// ============================================================
const clock = new THREE.Clock();
const _v = new THREE.Vector3();
const _p0 = new THREE.Vector3();
const _p1 = new THREE.Vector3();
const _sun = new THREE.Vector3();
const _look = new THREE.Vector3();

function animate() {
  const t = clock.getElapsedTime();
  shared.uTime.value = t;
  // slow global light modulation: swell passing overhead
  shared.uPulse.value = 0.80 + 0.20 * Math.sin(t * 0.23) * Math.sin(t * 0.111 + 1.7) + 0.12;

  // diver drift: slow sway + breathing bob
  camera.position.set(
    camBase.x + Math.sin(t * 0.110) * 0.65 + Math.sin(t * 0.041) * 0.9,
    camBase.y + Math.sin(t * 0.230) * 0.14 + Math.sin(t * 0.071) * 0.28,
    camBase.z + Math.sin(t * 0.053) * 0.9
  );
  _look.set(
    Math.sin(t * 0.047) * 3.2,
    camBase.y - 0.9 + Math.sin(t * 0.083) * 0.55,
    -8
  );
  camera.lookAt(_look);
  shared.uCamPos.value.copy(camera.position);

  // fish: evaluate wander paths, orient along velocity
  for (const f of fishes) {
    const ft = t + f.tLag;
    f.path(ft, _p0);
    f.path(ft + 0.3, _p1);
    if (f.off.lengthSq() > 0) {
      _p0.x += f.off.x + Math.sin(t * 0.31 + f.offPhase) * 0.35;
      _p0.y += f.off.y + Math.sin(t * 0.43 + f.offPhase * 2.0) * 0.2;
      _p0.z += f.off.z + Math.cos(t * 0.27 + f.offPhase) * 0.35;
      _p1.x += f.off.x; _p1.y += f.off.y; _p1.z += f.off.z;
    }
    f.mesh.position.copy(_p0);
    f.mesh.lookAt(_p1);
  }

  // project the sun for the god-ray pass
  _sun.copy(shared.uSunDir.value).multiplyScalar(100).add(camera.position).project(camera);
  postUniforms.uSunUV.value.set(_sun.x * 0.5 + 0.5, _sun.y * 0.5 + 0.5);
  postUniforms.uAspect.value = camera.aspect;

  renderer.setRenderTarget(renderTarget);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  postUniforms.tScene.value = renderTarget.texture;
  renderer.render(postScene, postCam);

  requestAnimationFrame(animate);
}

// ============================================================
// Resize → regenerate a fresh seabed
// ============================================================
let resizeTimer = null;
function applySize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderTarget.setSize(renderer.domElement.width, renderer.domElement.height);
  postUniforms.uRes.value.set(renderer.domElement.width, renderer.domElement.height);
}
window.addEventListener('resize', () => {
  applySize();
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => buildScene((Math.random() * 2 ** 31) | 0), 350);
});

// hide the cursor when idle, like a proper screensaver
let cursorTimer = null;
window.addEventListener('mousemove', () => {
  document.body.classList.remove('idle');
  clearTimeout(cursorTimer);
  cursorTimer = setTimeout(() => document.body.classList.add('idle'), 2500);
});
cursorTimer = setTimeout(() => document.body.classList.add('idle'), 2500);

// click for a fresh scene
window.addEventListener('pointerdown', () => buildScene((Math.random() * 2 ** 31) | 0));

applySize();
buildScene((Math.random() * 2 ** 31) | 0);
animate();
</script>
</body>
</html>
